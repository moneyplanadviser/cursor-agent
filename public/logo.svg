  <path d="M186 75 L195 52" stroke="#B8956A" stroke-width="1.5" fill="none"/>

  <!-- Bread - curved swoosh line -->
  <path d="M140 320 C200 280, 310 270, 340 300" stroke="#C4A35A" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Bread body -->
  <path d="M175 330 C175 295, 220 270, 290 270 C360 270, 360 300, 355 330 C350 340, 180 340, 175 330 Z" stroke="#A07844" stroke-width="2.5" fill="none"/>

  <!-- Bread score lines -->
  <path d="M230 285 C250 275, 270 278, 285 290" stroke="#A07844" stroke-width="2" fill="none"/>
  <path d="M250 295 C265 287, 285 288, 300 298" stroke="#A07844" stroke-width="2" fill="none"/>
  <path d="M270 305 C280 300, 298 300, 315 308" stroke="#A07844" stroke-width="2" fill="none"/>

  <!-- Bread bottom line -->
  <path d="M185 335 L350 335" stroke="#A07844" stroke-width="1.5" fill="none"/>

  <!-- Text: ¦ h HP -->
  <text x="155" y="400" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif" font-size="36" fill="#A07844" letter-spacing="12" font-weight="400">¦ h HP</text>
</svg>
