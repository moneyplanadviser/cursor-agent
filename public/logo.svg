  <path d="M120 380 C110 370, 100 360, 115 345" stroke="#B8956A" stroke-width="3" fill="none"/>
  <ellipse cx="108" cy="362" rx="12" ry="20" transform="rotate(-30 108 362)" stroke="#B8956A" stroke-width="2.5" fill="none"/>

  <!-- Wheat grains - left side -->
  <ellipse cx="162" cy="175" rx="8" ry="18" transform="rotate(-25 162 175)" stroke="#B8956A" stroke-width="2" fill="none"/>
  <ellipse cx="155" cy="200" rx="8" ry="18" transform="rotate(-20 155 200)" stroke="#B8956A" stroke-width="2" fill="none"/>
  <ellipse cx="148" cy="225" rx="8" ry="18" transform="rotate(-15 148 225)" stroke="#B8956A" stroke-width="2" fill="none"/>
  <ellipse cx="142" cy="250" rx="8" ry="16" transform="rotate(-10 142 250)" stroke="#B8956A" stroke-width="2" fill="none"/>
  <ellipse cx="137" cy="273" rx="7" ry="15" transform="rotate(-5 137 273)" stroke="#B8956A" stroke-width="2" fill="none"/>
  <ellipse cx="133" cy="295" rx="7" ry="14" transform="rotate(0 133 295)" stroke="#B8956A" stroke-width="2" fill="none"/>

  <!-- Wheat grains - right side -->
  <ellipse cx="192" cy="165" rx="8" ry="18" transform="rotate(25 192 165)" stroke="#B8956A" stroke-width="2" fill="none"/>
  <ellipse cx="195" cy="190" rx="8" ry="18" transform="rotate(20 195 190)" stroke="#B8956A" stroke-width="2" fill="none"/>
  <ellipse cx="196" cy="215" rx="8" ry="18" transform="rotate(15 196 215)" stroke="#B8956A" stroke-width="2" fill="none"/>
  <ellipse cx="195" cy="240" rx="8" ry="16" transform="rotate(10 195 240)" stroke="#B8956A" stroke-width="2" fill="none"/>
  <ellipse cx="192" cy="263" rx="7" ry="15" transform="rotate(5 192 263)" stroke="#B8956A" stroke-width="2" fill="none"/>

  <!-- Wheat top -->
  <path d="M180 100 L178 80" stroke="#B8956A" stroke-width="2.5" fill="none"/>
  <ellipse cx="178" cy="90" rx="5" ry="12" transform="rotate(-15 178 90)" stroke="#B8956A" stroke-width="2" fill="none"/>
  <ellipse cx="185" cy="85" rx="5" ry="12" transform="rotate(15 185 85)" stroke="#B8956A" stroke-width="2" fill="none"/>

  <!-- Wheat awn (top whiskers) -->
  <path d="M178 78 L168 55" stroke="#B8956A" stroke-width="1.5" fill="none"/>
  <path d="M180 75 L175 50" stroke="#B8956A" stroke-width="1.5" fill="none"/>
