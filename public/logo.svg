<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Wheat stalk - stem -->
  <path d="M120 380 C100 300, 160 200, 180 100" stroke="#B8956A" stroke-width="3" fill="none"/>
